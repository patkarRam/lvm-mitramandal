<title>Kanheri Caves Trip</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.85)
),
url("coverpage2.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;

color:white;
}

/* BACK BUTTON */

.back{
padding:25px;
}

.back a{

text-decoration:none;

color:white;

background:#111;

padding:12px 22px;

border-radius:30px;

border:1px solid rgba(255,255,255,.08);

transition:.3s;
}

.back a:hover{

background:#1a1a1a;

transform:translateY(-2px);
}

/* HERO SECTION */

.header{

width:min(1300px,92%);

margin:20px auto;

position:relative;

overflow:hidden;

border-radius:30px;
}

.header img{

width:100%;

height:500px;

object-fit:cover;

display:block;
}

.hero-overlay{

position:absolute;
inset:0;

background:
linear-gradient(
transparent,
rgba(0,0,0,.85)
);

display:flex;

align-items:flex-end;

padding:40px;
}

.hero-overlay h1{

font-size:clamp(2rem,5vw,4rem);

font-weight:800;

margin-bottom:10px;
}

.hero-overlay p{

opacity:.85;

font-size:1rem;
}

/* STATS */

.stats{

display:flex;

justify-content:center;

gap:60px;

flex-wrap:wrap;

margin:50px 0;

text-align:center;
}

.stats h2{

font-size:2.7rem;

font-weight:700;
}

.stats p{

opacity:.65;
}

/* STORY */

.story{

width:min(900px,90%);

margin:0 auto 50px;

background:#111;

border:1px solid rgba(255,255,255,.08);

padding:30px;

border-radius:25px;
}

.story h2{

margin-bottom:15px;
}

.story p{

line-height:1.8;

opacity:.8;
}

/* GALLERY */

.gallery{

width:min(1300px,92%);

margin:auto;

columns:3;

column-gap:18px;
}

.gallery img{

width:100%;

margin-bottom:18px;

border-radius:18px;

transition:.4s;

cursor:pointer;
}

.gallery img:hover{

transform:scale(1.02);

filter:brightness(1.05);
}

/* VIDEO SECTION */

.video-section{

text-align:center;

margin:80px 0;
}

.video-section h2{

margin-bottom:10px;
}

.video-section p{

opacity:.7;

margin-bottom:20px;
}

.video-section video{

max-width:90%;

border-radius:20px;

border:1px solid rgba(255,255,255,.08);
}

/* QUOTE */

.quote{

text-align:center;

font-size:1.4rem;

font-weight:600;

margin:60px 20px;

opacity:.9;
}

/* FOOTER */

.footer{

text-align:center;

padding:40px 20px;

margin-top:50px;

border-top:1px solid rgba(255,255,255,.08);
}

.footer p{

opacity:.7;
}

/* ANIMATIONS */

.gallery img{

animation:fadeUp .7s ease;
}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(20px);
}

to{

opacity:1;

transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

.header img{

height:300px;
}

.hero-overlay{

padding:25px;
}

.hero-overlay h1{

font-size:2rem;
}

.gallery{

columns:1;
}

.stats{

gap:25px;
}

.stats h2{

font-size:2rem;
}

.story{

padding:20px;
}

.quote{

font-size:1.1rem;
}

}

</style>
