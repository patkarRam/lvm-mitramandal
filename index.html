<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>L.V.M Mitramandal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background-image:
    linear-gradient(
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.45)
    ),
    url("coverpage.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment: fixed;


    min-height:100vh;
}

/* HEADER */

.header{

    text-align:center;

    padding-top:80px;
}

.header h1{

    font-size:80px;

    color:white;

    text-shadow:0 4px 15px rgba(0,0,0,0.8);

    margin-bottom:15px;
}

.header p{

    color:white;

    font-size:24px;

    text-shadow:0 2px 10px rgba(0,0,0,0.8);
}

/* MAIN CARDS */

.main{

    display:flex;

    justify-content:center;

    gap:40px;

    margin-top:80px;

    flex-wrap:wrap;
}

.card{

    width:320px;

    padding:35px;

    text-align:center;

    border-radius:20px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 30px rgba(0,0,0,0.3);

    transition:0.4s;
}

.card:hover{

    transform:
    translateY(-10px)
    scale(1.03);
}

.card h2{

    color:white;

    font-size:32px;

    margin-bottom:15px;
}

.card p{

    color:#ececec;

    font-size:18px;
}

/* BUTTON */

.btn{

    display:inline-block;

    margin-top:20px;

    padding:12px 28px;

    background:#ff5f6d;

    color:white;

    text-decoration:none;

    border-radius:30px;

    transition:0.3s;
}

.btn:hover{

    background:#ff3d52;

    box-shadow:
    0 0 20px rgba(255,95,109,0.7);
}

/* STATS */

.stats{

    display:flex;

    justify-content:center;

    gap:80px;

    margin-top:90px;

    color:white;

    text-align:center;

    flex-wrap:wrap;
}

.stats h2{

    font-size:40px;
}

.stats p{

    font-size:18px;
}

/* FOOTER */

.footer{

    text-align:center;

    color:white;

    margin-top:80px;

    padding-bottom:30px;
}

/* MOBILE */

@media(max-width:768px){

    .header h1{

        font-size:45px;
    }

    .header p{

        font-size:18px;
    }

    .card{

        width:85%;
    }

    .stats{

        gap:30px;
    }

    .stats h2{

        font-size:30px;
    }
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>L.V.M मित्रमंडळ</h1>

    <p>
        Travel • Friendship • Memories 
    </p>

</div>

<!-- CARDS -->

<div class="main">

    <div class="card">

        <h2>Members</h2>

        <p>
            Meet all members of our group.
        </p>

        <a href="members.html" class="btn">
            View Members
        </a>

    </div>

    <div class="card">

        <h2>Trips</h2>

        <p>
            Explore all our adventures and memories.
        </p>

        <a href="trips.html" class="btn">
            View Trips
        </a>

    </div>

</div>

<!-- STATS -->

<div class="stats">

    <div>
        <h2>14+</h2>
        <p>Members</p>
    </div>

    <div>
        <h2>12+</h2>
        <p>Trips</p>
    </div>

    <div>
        <h2>500+</h2>
        <p>Photos</p>
    </div>

    <div>
        <h2>3+</h2>
        <p>Years Together</p>
    </div>

</div>

<!-- FOOTER -->

<div class="footer">

    ❤️ L.V.M Mitramandal

</div>

</body>
</html>
