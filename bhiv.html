<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background-image:
    linear-gradient(
        rgba(0,0,0,0.60),
        rgba(0,0,0,0.60)
    ),
    url("coverpage.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    min-height:100vh;
}

/* Back Button */

.back{
    padding:20px;
}

.back a{

    text-decoration:none;

    color:white;

    background:#ff5f6d;

    padding:10px 20px;

    border-radius:25px;

    transition:0.3s;
}

.back a:hover{

    background:#ff3d52;
}

/* Header */

.header{

    text-align:center;

    padding:20px;
}

.header h1{

    color:white;

    font-size:60px;

    text-shadow:0 4px 15px rgba(0,0,0,0.8);
}

.header p{

    color:#e8e8e8;

    font-size:20px;
}

/* Stats */

.stats{

    display:flex;

    justify-content:center;

    gap:60px;

    margin:30px 0;

    color:white;

    text-align:center;

    flex-wrap:wrap;
}

/* Gallery */

.gallery{

    width:90%;

    margin:auto;

    columns:3;

    column-gap:15px;
}

.gallery img{

    width:100%;

    margin-bottom:15px;

    border-radius:15px;

    box-shadow:0 8px 20px rgba(0,0,0,0.3);

    transition:0.3s;
}

.gallery img:hover{

    transform:scale(1.03);

    cursor:pointer;
}

/* Video */

.video-section{

    text-align:center;

    margin:60px 0;

    color:white;
}

.video-btn{

    display:inline-block;

    text-decoration:none;

    background:#ff5f6d;

    color:white;

    padding:15px 25px;

    border-radius:30px;

    margin-top:15px;

    transition:0.3s;
}

.video-btn:hover{

    background:#ff3d52;
}

/* Quote */

.quote{

    text-align:center;

    color:white;

    font-size:22px;

    font-style:italic;

    margin:50px 20px;
}

/* Footer */

.footer{

    text-align:center;

    color:white;

    padding:25px;
}

/* Mobile */

@media(max-width:768px){

    .gallery{
        columns:1;
    }

    .header h1{
        font-size:40px;
    }

} 
</style>
