<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>L.V.M Mitramandal - Members</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background-image:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.55)
    ),
    url("coverpage.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    min-height:100vh;
}

/* BACK BUTTON */

.back{

    padding:20px;
}

.back a{

    text-decoration:none;

    color:white;

    background:#ff5f6d;

    padding:10px 20px;

    border-radius:25px;

    transition:0.3s;
}

.back a:hover{

    background:#ff3d52;
}

/* HEADER */

.header{

    text-align:center;

    margin-bottom:40px;
}

.header h1{

    font-size:60px;

    color:white;

    text-shadow:0 4px 15px rgba(0,0,0,0.8);
}

.subtitle{

    color:white;

    font-size:20px;

    margin-top:10px;
}

/* GRID */

.main{

    width:90%;

    margin:auto;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:25px;

    padding-bottom:50px;
}

/* CARD */

.card{

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:20px;

    padding:20px;

    text-align:center;

    box-shadow:0 8px 25px rgba(0,0,0,0.3);

    transition:0.4s;
}

.card:hover{

    transform:
    translateY(-10px)
    scale(1.03);

    box-shadow:
    0 15px 35px rgba(0,0,0,0.5);
}

/* IMAGE */

.card img{

    width:170px;
    height:170px;

    object-fit:cover;

    border-radius:50%;

    border:4px solid white;
}

/* NAME */

.card h3{

    color:white;

    margin-top:15px;

    font-size:22px;
}

/* ROLE */

.card p{

    color:#e8e8e8;

    margin-top:8px;

    font-size:14px;
}

/* MOBILE */

@media(max-width:900px){

.main{

    grid-template-columns:1fr 1fr;
}

}

@media(max-width:600px){

.main{

    grid-template-columns:1fr;
}

.header h1{

    font-size:40px;
}

}

</style>
</head>

<body>

<div class="back">

    <a href="index.html">← Back</a>

</div>
